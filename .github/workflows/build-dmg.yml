name: Build DMG

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # The project needs Swift 6; pick the latest stable Xcode on the runner.
      - name: Select Xcode (Swift 6)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: swift --version

      - name: Build app + DMG
        run: ./scripts/make-dmg.sh dist/FanzyZones.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: FanzyZones-dmg
          path: dist/FanzyZones.dmg

      # On a version tag, publish a GitHub Release with the DMG attached.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FanzyZones.dmg
          generate_release_notes: true
